<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refranes - El Reto del Profe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f0c29;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    width: 100%;
    min-height: 100vh;
    padding: 16px 12px 32px;
    text-align: center;
    animation: fadeIn 0.5s ease;
    overflow-y: auto;
  }
  /* Pantallas intro y final sí centradas verticalmente */
  #screen1, #screen2, #screen4 {
    justify-content: center;
  }
  /* Pantalla juego: empieza desde arriba con padding top */
  #screen3 {
    padding-top: 20px;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* PANTALLA 1 */
  .title-big {
    font-size: clamp(2rem, 8vw, 4rem);
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
    text-shadow: none;
  }
  .subtitle {
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: #ccc;
    margin-bottom: 40px;
    font-style: italic;
  }
  .deco-line {
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    border-radius: 2px;
    margin: 0 auto 40px;
  }

  /* BOTONES */
  .btn {
    padding: 16px 44px;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    outline: none;
  }
  .btn-gold {
    background: linear-gradient(90deg, #f7971e, #ffd200);
    color: #1a1a2e;
    box-shadow: 0 4px 20px rgba(247,151,30,0.5);
  }
  .btn-gold:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(247,151,30,0.7); }
  .btn-red {
    background: linear-gradient(90deg, #e52d27, #b31217);
    color: white;
    box-shadow: 0 4px 20px rgba(229,45,39,0.5);
  }
  .btn-red:hover { transform: scale(1.05); }
  .btn-green {
    background: linear-gradient(90deg, #11998e, #38ef7d);
    color: #1a1a2e;
    box-shadow: 0 4px 20px rgba(56,239,125,0.4);
  }
  .btn-green:hover { transform: scale(1.05); }
  .btn-gray {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .btn-gray:hover { background: rgba(255,255,255,0.25); }

  /* PANTALLA 2 - MEME */
  .meme-text {
    font-size: clamp(1rem, 3.5vw, 1.5rem);
    color: #fff;
    margin-bottom: 20px;
    font-weight: 600;
    max-width: 500px;
    line-height: 1.5;
  }
  .meme-img {
    max-width: min(320px, 80vw);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    margin-bottom: 30px;
    border: 3px solid rgba(255,215,0,0.4);
  }

  /* PANTALLA 3 - JUEGO */
  .game-header {
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding: 12px 20px;
    background: rgba(255,255,255,0.07);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .score-box {
    display: flex;
    gap: 20px;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .score-correct { color: #38ef7d; }
  .score-wrong { color: #ff6b6b; }
  .progress-text { color: #aaa; font-size: 0.9rem; }

  .refran-card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 32px 28px;
    max-width: 600px;
    width: 100%;
    margin-bottom: 24px;
    backdrop-filter: blur(10px);
  }
  .refran-label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #aaa;
    margin-bottom: 12px;
  }
  .refran-primera {
    font-size: clamp(1.3rem, 4vw, 2rem);
    font-weight: 700;
    color: #ffd200;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .refran-dots {
    font-size: 2rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 4px;
    margin-bottom: 4px;
  }

  .speak-btn {
    background: rgba(247,151,30,0.2);
    border: 2px solid #f7971e;
    color: #f7971e;
    border-radius: 50px;
    padding: 10px 24px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 16px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .speak-btn:hover { background: rgba(247,151,30,0.35); }

  .input-area {
    max-width: 600px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }
  .respuesta-input {
    width: 100%;
    padding: 16px 20px;
    font-size: 1.1rem;
    border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
    transition: border 0.2s;
  }
  .respuesta-input::placeholder { color: rgba(255,255,255,0.4); }
  .respuesta-input:focus { border-color: #ffd200; }

  /* FEEDBACK */
  .feedback {
    max-width: 600px;
    width: 100%;
    border-radius: 16px;
    padding: 18px 24px;
    font-size: 1.1rem;
    font-weight: 600;
    display: none;
    animation: popIn 0.3s ease;
    margin-bottom: 16px;
  }
  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
  .feedback.correcto {
    background: rgba(56,239,125,0.2);
    border: 2px solid #38ef7d;
    color: #38ef7d;
    display: block;
  }
  .feedback.incorrecto {
    background: rgba(255,107,107,0.2);
    border: 2px solid #ff6b6b;
    color: #ff6b6b;
    display: block;
  }
  .respuesta-correcta {
    font-size: 0.95rem;
    opacity: 0.8;
    margin-top: 6px;
  }

  /* PANTALLA FINAL */
  .final-score {
    font-size: clamp(3rem, 12vw, 6rem);
    font-weight: 900;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin: 10px 0;
  }
  .final-label {
    font-size: 1.1rem;
    color: #aaa;
    margin-bottom: 30px;
  }
  .final-stars {
    font-size: 3rem;
    margin-bottom: 20px;
  }
  .final-mensaje {
    font-size: 1.3rem;
    color: #fff;
    max-width: 400px;
    margin-bottom: 30px;
    line-height: 1.5;
  }
  .final-buttons {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  
  .hidden { display: none !important; }
</style>
</head>

  <div class="title-big" style="font-size: clamp(1.2rem, 4vw, 2rem); margin-top: -10px; margin-bottom: 16px;">El Reto del Profe</div>
  <div class="deco-line"></div>

</div>

let ultimoOK = -1;
let ultimoMAL = -1;

function mensajeSinRepetir(lista, ultimo) {
  let idx;
  do { idx = Math.floor(Math.random() * lista.length); } while (idx === ultimo && lista.length > 1);
  return { msg: lista[idx], idx };
}

function irA(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen'+n).classList.add('active');
}

function mezclar(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function iniciarJuego() {
  orden = mezclar(REFRANES.map((_, i) => i));
  indice = 0;
  aciertos = 0;
  errores = 0;
  irA(3);
  cargarRefran();
}

function cargarRefran() {
  respondido = false;
  const r = REFRANES[orden[indice]];
  document.getElementById('primera-parte').textContent = r[0] + '...';
  document.getElementById('respuesta-input').value = '';
  document.getElementById('respuesta-input').disabled = false;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('btn-siguiente').style.display = 'none';
  document.getElementById('num-actual').textContent = indice + 1;
  document.getElementById('aciertos').textContent = aciertos;
  document.getElementById('errores').textContent = errores;
  setTimeout(() => document.getElementById('respuesta-input').focus(), 100);
  leerRefran();
}

function getVozEspanol() {
  const voces = window.speechSynthesis.getVoices();
  // Android Chrome tiene voces como "es-us-x-sfb-local" o "Spanish"
  // Intentamos en orden de preferencia
  return voces.find(v => v.lang === 'es-ES' && !v.localService === false)  // online es-ES
      || voces.find(v => v.lang === 'es-ES')
      || voces.find(v => v.lang === 'es-MX')
      || voces.find(v => v.lang === 'es-US')
      || voces.find(v => v.lang.startsWith('es'))
      || null;
}

function leerRefran() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const r = REFRANES[orden[indice]];
  const texto = r[0] + '...';
  const utter = new SpeechSynthesisUtterance(texto);
  utter.lang = 'es-ES';
  utter.rate = 0.75;
  utter.pitch = 1.1;
  utter.volume = 1;
  const voz = getVozEspanol();
  if (voz) utter.voice = voz;
  window.speechSynthesis.speak(utter);
}

function hablar(texto, malo) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(texto);
  utter.lang = 'es-ES';
  utter.volume = 1;
  // Android Chrome respeta rate pero no siempre pitch
  // Usamos diferencias de rate más marcadas para que se note
  if (malo) {
    utter.rate = 0.78;
    utter.pitch = 0.7;
  } else {
    utter.rate = 1.1;
    utter.pitch = 1.5;
  }
  const voz = getVozEspanol();
  if (voz) utter.voice = voz;
  window.speechSynthesis.speak(utter);
}

function similitud(a, b) {
  a = normalizar(a);
  b = normalizar(b);
  if (a === b) return 1;
  if (b.includes(a) || a.includes(b)) return 0.9;
  // Levenshtein simplificado
  const la = a.length, lb = b.length;
  if (Math.abs(la - lb) > 5) return 0;
  const dp = Array.from({length: la+1}, (_, i) => 
    Array.from({length: lb+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0)
  );
  for (let i = 1; i <= la; i++)
    for (let j = 1; j <= lb; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] :
        1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  const dist = dp[la][lb];
  return 1 - dist / Math.max(la, lb);
}

function normalizar(s) {
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9 ]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function validar() {
  if (respondido) return;
  const input = document.getElementById('respuesta-input');
  const resp = input.value.trim();
  if (!resp) return;
  
  respondido = true;
  input.disabled = true;
  
  const refranIndex = orden[indice];
  const correcta = REFRANES[refranIndex][1];
  const sim = similitud(resp, correcta);
  const esCorrecta = sim >= 0.7;
  
  const fb = document.getElementById('feedback');
  
  if (esCorrecta) {
    aciertos++;
    const msg = COMENTARIOS[refranIndex][0];
    fb.className = 'feedback correcto';
    fb.innerHTML = '✅ ' + msg;
    hablar(msg, false);
  } else {
    errores++;
    const msg = COMENTARIOS[refranIndex][1];
    fb.className = 'feedback incorrecto';
    fb.innerHTML = '❌ ' + msg + '<div class="respuesta-correcta">La respuesta correcta era: <strong>' + correcta + '</strong></div>';
    hablar(msg + '. La respuesta era: ' + correcta, true);
  }
  
  document.getElementById('aciertos').textContent = aciertos;
  document.getElementById('errores').textContent = errores;
  
  if (indice < REFRANES.length - 1) {
    document.getElementById('btn-siguiente').style.display = 'inline-block';
  } else {
    setTimeout(mostrarFinal, 2000);
  }
}

function siguiente() {
  indice++;
  cargarRefran();
}

function mostrarFinal() {
  irA(4);
  const total = REFRANES.length;
  const pct = Math.round((aciertos / total) * 100);
  document.getElementById('final-pct').textContent = pct + '%';
  document.getElementById('aciertos').textContent = aciertos;
  
  let stars, msg;
  if (pct >= 85) {
    stars = '⭐⭐⭐';
    msg = '¡Increíble! Este curso me sorprendió. Merecen un aplauso... aunque no se los voy a dar.';
  } else if (pct >= 60) {
    stars = '⭐⭐';
    msg = 'Bien, bien... para ser este curso, no está mal. Algo aprendieron.';
  } else if (pct >= 40) {
    stars = '⭐';
    msg = 'Mmm... hay que estudiar más, pues. Pero bueno, algo es algo.';
  } else {
    stars = '💀';
    msg = '¡Ay, ay, ay! Esto fue un desastre total. Mañana vienen con los refranes memorizados.';
  }
  
  document.getElementById('final-stars').textContent = stars;
  document.getElementById('final-msg').textContent = msg;
  hablar(msg, pct < 40);
}

function reiniciar() {
  iniciarJuego();
}
